<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raksha - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto",
          "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans",
          "Helvetica Neue", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 12px;
        padding: 40px;
        text-align: center;
        max-width: 500px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
        background: #f0f0f0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 24px;
      }

      p {
        color: #666;
        margin-bottom: 20px;
        line-height: 1.6;
      }

      .button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 20px;
        transition: transform 0.2s;
      }

      .button:hover {
        transform: scale(1.05);
      }

      .button:active {
        transform: scale(0.98);
      }

      .features {
        text-align: left;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid #eee;
      }

      .features h2 {
        font-size: 16px;
        color: #333;
        margin-bottom: 10px;
      }

      .features ul {
        list-style: none;
      }

      .features li {
        color: #666;
        margin-bottom: 8px;
        padding-left: 20px;
        position: relative;
      }

      .features li:before {
        content: "✓";
        position: absolute;
        left: 0;
        color: #667eea;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📱</div>
      <h1>You're Offline</h1>
      <p>
        It looks like you don't have an internet connection right now. Some
        features of Raksha may not be available until you reconnect.
      </p>

      <button class="button" onclick="location.reload()">Try Again</button>

      <div class="features">
        <h2>💡 Available Offline:</h2>
        <ul>
          <li>View cached content</li>
          <li>Read previously loaded pages</li>
          <li>Access emergency contacts</li>
        </ul>
      </div>
    </div>

    <script>
      // Listen for when the user comes back online
      window.addEventListener("online", () => {
        console.log("Back online!");
        location.reload();
      });

      // Check if online when page loads
      if (navigator.onLine) {
        location.reload();
      }
    </script>
  </body>
</html>
